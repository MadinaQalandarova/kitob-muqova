<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitob Studio — Kirish</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0f0f1a;
        --panel: #16213e;
        --card: #1a2744;
        --accent: #f0c27f;
        --red: #e94560;
        --text: #e8e8f0;
        --muted: #7788aa;
        --border: #2a3a5a;
      }
      body {
        font-family: "Nunito", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .a-wrap {
        width: 100%;
        max-width: 420px;
      }
      .a-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
        margin-bottom: 32px;
      }
      .a-logo svg {
        width: 32px;
        height: 32px;
      }
      .a-logo span {
        font-family: "Playfair Display", serif;
        font-size: 1.5rem;
        color: var(--accent);
        letter-spacing: 1px;
      }
      .a-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 36px 32px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
      .a-tabs {
        display: flex;
        background: var(--card);
        border-radius: 10px;
        padding: 4px;
        margin-bottom: 26px;
        gap: 4px;
      }
      .a-tab {
        flex: 1;
        padding: 9px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--muted);
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
      }
      .a-tab.on {
        background: var(--accent);
        color: var(--bg);
      }
      .a-field {
        margin-bottom: 15px;
      }
      .a-field label {
        display: block;
        font-size: 0.73rem;
        color: var(--muted);
        margin-bottom: 5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .a-field input {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 0.9rem;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s;
      }
      .a-field input:focus {
        border-color: var(--accent);
      }
      .a-btn {
        width: 100%;
        padding: 13px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, var(--red), var(--accent));
        color: var(--bg);
        font-family: inherit;
        font-size: 0.92rem;
        font-weight: 800;
        cursor: pointer;
        margin-top: 6px;
        transition:
          opacity 0.15s,
          transform 0.15s;
        letter-spacing: 0.3px;
      }
      .a-btn:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .a-btn:active {
        transform: translateY(0);
      }
      .a-div {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 18px 0;
        color: var(--muted);
        font-size: 0.75rem;
      }
      .a-div::before,
      .a-div::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .a-google {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        transition: all 0.15s;
      }
      .a-google:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .a-err {
        color: var(--red);
        font-size: 0.78rem;
        text-align: center;
        margin-top: 12px;
        min-height: 20px;
        line-height: 1.4;
      }
      .a-ok {
        color: #52d68a;
        font-size: 0.78rem;
        text-align: center;
        margin-top: 12px;
      }
      .a-spin {
        display: none;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .a-btn.loading .a-spin {
        display: inline-block;
      }
      .a-btn.loading .a-btxt {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="a-wrap">
      <div class="a-logo">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="#f0c27f"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path
            d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"
          />
        </svg>
        <span>Kitob Studio</span>
      </div>

      <div class="a-card">
        <div class="a-tabs">
          <button
            class="a-tab on"
            id="tab-login-btn"
            onclick="showTab('login')"
          >
            Kirish
          </button>
          <button class="a-tab" id="tab-reg-btn" onclick="showTab('register')">
            Ro'yxatdan o'tish
          </button>
        </div>

        <!-- LOGIN -->
        <div id="pane-login">
          <div class="a-field">
            <label>Email</label>
            <input
              type="email"
              id="l-email"
              placeholder="email@misol.com"
              autocomplete="email"
            />
          </div>
          <div class="a-field">
            <label>Parol</label>
            <input
              type="password"
              id="l-pass"
              placeholder="Parolingiz"
              autocomplete="current-password"
              onkeydown="if (event.key === 'Enter') doLogin();"
            />
          </div>
          <button class="a-btn" id="l-btn" onclick="doLogin()">
            <span class="a-btxt">Kirish</span>
            <div class="a-spin"></div>
          </button>
          <div class="a-div">yoki</div>
          <button class="a-google" onclick="doGoogle()">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            Google bilan kirish
          </button>
        </div>

        <!-- REGISTER -->
        <div id="pane-register" style="display: none">
          <div class="a-field">
            <label>Ism</label>
            <input
              type="text"
              id="r-name"
              placeholder="Ismingiz"
              autocomplete="name"
            />
          </div>
          <div class="a-field">
            <label>Email</label>
            <input
              type="email"
              id="r-email"
              placeholder="email@misol.com"
              autocomplete="email"
            />
          </div>
          <div class="a-field">
            <label>Parol</label>
            <input
              type="password"
              id="r-pass"
              placeholder="Kamida 6 belgi"
              autocomplete="new-password"
              onkeydown="if (event.key === 'Enter') doRegister();"
            />
          </div>
          <button class="a-btn" id="r-btn" onclick="doRegister()">
            <span class="a-btxt">Ro'yxatdan o'tish</span>
            <div class="a-spin"></div>
          </button>
          <div class="a-div">yoki</div>
          <button class="a-google" onclick="doGoogle()">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.77c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            Google bilan kirish
          </button>
        </div>

        <div class="a-err" id="a-err"></div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
      // Agar allaqachon kirgan bo'lsa, to'g'ridan-to'g'ri o'tkazib yuborish
      ksAuth.onAuthStateChanged((u) => {
        if (u) window.location.replace("index.html");
      });

      function showTab(t) {
        const isLogin = t === "login";
        document
          .getElementById("tab-login-btn")
          .classList.toggle("on", isLogin);
        document.getElementById("tab-reg-btn").classList.toggle("on", !isLogin);
        document.getElementById("pane-login").style.display = isLogin
          ? "block"
          : "none";
        document.getElementById("pane-register").style.display = isLogin
          ? "none"
          : "block";
        document.getElementById("a-err").textContent = "";
      }

      function setLoading(btnId, on) {
        document.getElementById(btnId).classList.toggle("loading", on);
        document.getElementById(btnId).disabled = on;
      }

      function showErr(msg) {
        document.getElementById("a-err").textContent = msg;
      }

      const ERR = {
        "auth/user-not-found": "Bu email ro'yxatdan o'tmagan",
        "auth/wrong-password": "Noto'g'ri parol",
        "auth/invalid-credential": "Email yoki parol noto'g'ri",
        "auth/invalid-email": "Email noto'g'ri formatda",
        "auth/email-already-in-use": "Bu email allaqachon ro'yxatdan o'tgan",
        "auth/weak-password": "Parol juda zaif (kamida 6 belgi)",
        "auth/too-many-requests": "Ko'p urinish. Biroz kutib uring",
        "auth/network-request-failed": "Internet bilan muammo",
      };

      async function doLogin() {
        const email = document.getElementById("l-email").value.trim();
        const pass = document.getElementById("l-pass").value;
        if (!email || !pass) {
          showErr("Email va parolni kiriting");
          return;
        }
        setLoading("l-btn", true);
        try {
          await ksAuth.signInWithEmailAndPassword(email, pass);
          window.location.replace("index.html");
        } catch (e) {
          showErr(ERR[e.code] || e.message);
          setLoading("l-btn", false);
        }
      }

      async function doRegister() {
        const name = document.getElementById("r-name").value.trim();
        const email = document.getElementById("r-email").value.trim();
        const pass = document.getElementById("r-pass").value;
        if (!name || !email || !pass) {
          showErr("Barcha maydonlarni to'ldiring");
          return;
        }
        if (pass.length < 6) {
          showErr("Parol kamida 6 belgi bo'lishi kerak");
          return;
        }
        setLoading("r-btn", true);
        try {
          const cred = await ksAuth.createUserWithEmailAndPassword(email, pass);
          await cred.user.updateProfile({ displayName: name });
          window.location.replace("index.html");
        } catch (e) {
          showErr(ERR[e.code] || e.message);
          setLoading("r-btn", false);
        }
      }

      async function doGoogle() {
        const prov = new firebase.auth.GoogleAuthProvider();
        try {
          await ksAuth.signInWithPopup(prov);
          window.location.replace("index.html");
        } catch (e) {
          showErr(ERR[e.code] || e.message);
        }
      }
    </script>
  </body>
</html>
